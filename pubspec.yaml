name: better_you
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Icons
  cupertino_icons: ^1.0.9

  # ==================== Firebase (Updated to latest) ====================
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  firebase_messaging: ^16.1.3
  firebase_storage: ^13.2.0

  # State Management (kept at v2 to avoid big refactor for now)
  flutter_riverpod: ^2.6.1

  # Charts
  fl_chart: ^1.2.0

  # Fonts
  google_fonts: ^8.0.2

  # HTTP
  http: ^1.2.2

  # Date and time
  intl: ^0.20.2

  # Local storage
  shared_preferences: ^2.5.5

  # Image picker
  image_picker: ^1.1.2

  # Permissions
  permission_handler: ^12.0.1

  # Calendar
  table_calendar: ^3.2.0

  # Local notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  flutter_timezone: ^3.0.1

  # Health data
  health: ^13.3.1
  pedometer: ^4.0.0

  # Chat UI
  flutter_chat_ui: ^2.11.1
  flutter_chat_types: ^3.6.2

  # UUID
  uuid: ^4.5.0

  # App Usage (Android only)
  usage_stats: ^1.1.0
  installed_apps: ^1.1.2
  android_intent_plus: ^5.0.2
  flutter_background_service: ^5.0.11
  flutter_background_service_android: ^6.1.1

  # Animations
  flutter_animate: ^4.5.2

  # Multimedia
  record: ^6.2.0
  audioplayers: ^6.6.0
  path_provider: ^2.1.5
  http_parser: ^4.0.0
  flutter_tts: ^4.2.2
  flutter_dotenv: ^6.0.0
  logger: ^2.7.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path: ^1.9.1
  go_router: ^17.1.0
  csv: ^8.0.0
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  mockito: ^5.4.4
  firebase_auth_mocks: ^0.15.1
  fake_cloud_firestore: ^4.1.0+1

flutter:
  generate: true
  uses-material-design: true

  assets:
    - .env
    - assets/
